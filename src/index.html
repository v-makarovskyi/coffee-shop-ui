<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.min.css" />
    <title>Coffee-Shop-UI</title>
  </head>
  <body>
    <header class="header">
      <div class="header__top">
        <div class="header__description">
          <p>
            Welcome to Early Birds. We ship every Tuesday and Thursday. Free
            shipping above €25 in The Netherlands.
          </p>
        </div>
      </div>

      <div class="header__bottom">
        <div class="header__bottom-inner container">
          <nav class="header__nav">
            <ul class="header__menu">
              <li class="header__menu-item">
                <a class="header__menu-link" href="/">Home</a>
              </li>
              <li class="header__menu-item">
                <a class="header__menu-link" href="/">Pages</a>
              </li>
              <li class="header__menu-item">
                <a class="header__menu-link" href="/">Shop</a>
              </li>
              <li class="header__menu-item">
                <a class="header__menu-link" href="/">Blog</a>
              </li>
            </ul>
          </nav>
          <img
            class="header__logo"
            src="./images/logo.svg"
            alt="logo"
            width="165"
            height="37"
            loading="lazy"
          />
          <div class="header__actions">
            <ul class="header__actions-list">
              <li class="header__action-item">
                <a class="header__actions-link" href="/">cart(0)</a>
              </li>
              <li class="header__action-item">
                <a class="header__actions-link" href="/">search</a>
              </li>
            </ul>
            <button
              class="header__actions-btn gamburger-button button"
              type="button"
              title="menu button"
            >
              <span></span><span></span><span></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <section class="slider">
      <div class="slider__item container not-padding">
        <div class="slider__body">
          <div class="slider__img-container">
            <img
              class="slider__img"
              src="./images/slider/slider-1.jpg"
              alt="slider one"
              width="998"
              height="1144"
            />
          </div>

          <div class="slider__info">
            <h2 class="slider__title">Enjoy life sip by sip</h2>
          </div>
        </div>
        <div class="slider__extra">
          <span>Fairtrade</span>
          <span>Organic</span>
          <span>Climate neutral</span>
        </div>
      </div>
    </section>
  </body>
</html>
